{% extends "base.html" %}

{% block title %}Crear Producto{% endblock %}

{% block content %}
<h2>Crear Producto</h2>

<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" name="nombre" id="nombre" class="form-control" placeholder="Nombre del producto" required>
    </div>

    <div class="mb-3">
        <label for="categoria" class="form-label">Categoría</label>
        <select name="categoria" id="categoria" class="form-select" required>
            <option value="" disabled selected>Seleccione una categoría</option>
            {% for cat in categorias %}
                <option value="{{ cat.id }}">{{ cat.nombre }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="precio" class="form-label">Precio</label>
        <input type="number" name="precio" id="precio" class="form-control" placeholder="Precio" min="1" required>
    </div>

    <button type="submit" class="btn btn-primary">Crear Producto</button>
    <a href="{% url 'lista_productos' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
